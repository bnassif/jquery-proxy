---
name: jquery-proxy
services:
  jquery-proxy:
    image: ghcr.io/bnassif/jquery-proxy
    hostname: app
    container_name: app
    restart: unless-stopped
    environment:
      REDIS_ENABLE: true
      REDIS_URL: redis://redis/0
    ports:
      - "8080:8080"
  redis:
    image: redis:8.6
    hostname: redis
    container_name: redis
